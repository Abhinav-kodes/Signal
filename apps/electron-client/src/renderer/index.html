<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Signal</title>
    <style>
      body {
        margin: 0;
        padding: 0;
        height: 50px; /* Must match UI_HEIGHT in main.ts */
        background: #202124; /* Dark browser theme */
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: system-ui, -apple-system, sans-serif;
        user-select: none;
      }
      
      .search-container {
        display: flex;
        width: 100%;
        max-width: 900px;
        padding: 0 16px;
        align-items: center;
      }

      /* Group the Back/Forward buttons together */
      .nav-group {
        display: flex;
        gap: 4px;
        margin-right: 12px;
      }

      /* Circular, modern navigation buttons */
      .nav-btn {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: none;
        background: transparent;
        color: #e8eaed; /* This color will automatically apply to the SVGs */
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background 0.2s ease;
      }
      .nav-btn:hover { 
        background: #3c4043; 
      }
      
      /* Make sure the SVG centers exactly and scales to 20px */
      .nav-btn svg {
        width: 20px;
        height: 20px;
      }

      /* Seamless pill-shaped search bar */
      .input-group {
        display: flex;
        flex: 1;
        background: #303134;
        border-radius: 24px;
        height: 36px;
        overflow: hidden;
        border: 1px solid transparent;
        transition: border-color 0.2s, background 0.2s;
      }
      .input-group:focus-within {
        background: #202124;
        border-color: #5f6368;
      }

      input {
        flex: 1;
        padding: 0 20px;
        border: none;
        outline: none;
        background: transparent;
        color: #e8eaed;
        font-size: 14px;
      }

      /* Subtler Go button that blends into the search bar */
      #go-btn {
        padding: 0 20px;
        border: none;
        background: transparent;
        color: #8ab4f8;
        cursor: pointer;
        font-weight: 500;
        font-size: 14px;
      }
      #go-btn:hover { 
        background: #3c4043; 
      }
    </style>
  </head>
  <body>
    <div class="search-container">
      <div class="nav-group">
        <button id="back-btn" class="nav-btn" title="Go back">
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"></line>
            <polyline points="12 19 5 12 12 5"></polyline>
          </svg>
        </button>
        <button id="forward-btn" class="nav-btn" title="Go forward">
          <svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
            <line x1="5" y1="12" x2="19" y2="12"></line>
            <polyline points="12 5 19 12 12 19"></polyline>
          </svg>
        </button>
        <button id="reload-btn" class="nav-btn" title="Reload page">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          </svg>
        </button>
      </div>
      
      <div class="input-group">
        <input type="text" id="url-input" placeholder="Search Google or type a URL" autocomplete="off" spellcheck="false" />
        <button id="go-btn">Go</button>
      </div>
    </div>
    
    <script type="module" src="./renderer.ts"></script>
  </body>
</html>
